apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: angular-pipeline-run-
  namespace: default
spec:
  pipelineRef:
    name: angular-frontend-pipeline
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: pipeline-pvc
  params:
    - name: repo-url
      value: "https://github.com/Guru09042004/minikube-gitops-project.git"
    - name: gitops-repo-url
      value: "https://github.com/Guru09042004/minikube-gitops-project.git"
    - name: image-name
      value: "docker.io/YOUR_DOCKER_HUB_USERNAME/angular-frontend"
    - name: image-tag
      value: "v1.0.0"
