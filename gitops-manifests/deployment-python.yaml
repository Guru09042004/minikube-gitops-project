apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-backend
  template:
    metadata:
      labels:
        app: python-backend
    spec:
      containers:
        - name: python-backend
          image: docker.io/Guru09042004/python-backend:latest
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: python-backend-service
  namespace: default
spec:
  selector:
    app: python-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
