apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone
spec:
  workspaces:
    - name: output
  params:
    - name: url
    - name: revision
      default: "main"
  steps:
    - name: clone
      image: alpine/git:v2.43.0
      script: |
        git clone $(params.url) $(workspaces.output.path)
        cd $(workspaces.output.path)
        git checkout $(params.revision)
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: maven-build
spec:
  workspaces:
    - name: source
  steps:
    - name: build
      image: maven:3.8.6-openjdk-11
      workingDir: $(workspaces.source.path)
      script: |
        mvn clean package -DskipTests
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm-build
spec:
  workspaces:
    - name: source
  steps:
    - name: build
      image: node:18-alpine
      workingDir: $(workspaces.source.path)
      script: |
        cd $(workspaces.source.path)
        npm install
        npm run build -- --configuration=production
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: kaniko-docker-build
spec:
  workspaces:
    - name: source
  params:
    - name: image-name
    - name: image-tag
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.14.0
      env:
        - name: DOCKER_CONFIG
          value: /kaniko/.docker
      script: |
        mkdir -p /kaniko/.docker
        echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n $DOCKER_USER:$DOCKER_PASS | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
        /kaniko/executor --context=$(workspaces.source.path) --dockerfile=$(workspaces.source.path)/Dockerfile --destination=$(params.image-name):$(params.image-tag)
      envFrom:
        - secretRef:
            name: pipeline-secrets
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: gitops-yaml-update
spec:
  workspaces:
    - name: source
  params:
    - name: gitops-repo-url
    - name: file-to-update
    - name: image-name
    - name: image-tag
  steps:
    - name: update-yaml
      image: alpine/git:v2.43.0
      envFrom:
        - secretRef:
            name: pipeline-secrets
      script: |
        git config --global user.email "tekton-ci@complete-workflow.com"
        git config --global user.name "Tekton Pipeline"
        REPO_URL=$(params.gitops-repo-url | sed 's/https:\/\///')
        git clone https://x-access-token:$github-token@$REPO_URL /tmp/gitops-repo
        cd /tmp/gitops-repo
        sed -i "s|$(params.image-name):.*|$(params.image-name):$(params.image-tag)|g" $(params.file-to-update)
        git add $(params.file-to-update)
        git commit -m "Automated CI: Updated $(params.image-name) to tag $(params.image-tag) [skip ci]" || exit 0
        git push origin main
