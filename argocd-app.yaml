apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: complete-three-tier-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Guru09042004/minikube-gitops-project.git'
    targetRevision: HEAD
    path: 'gitops-manifests'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
