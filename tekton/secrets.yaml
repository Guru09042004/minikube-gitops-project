apiVersion: v1
kind: Secret
metadata:
  name: pipeline-secrets
  namespace: default
type: Opaque
stringData:
  docker-username: "YOUR_DOCKER_HUB_USERNAME"
  docker-password: "YOUR_DOCKER_HUB_PASSWORD_OR_TOKEN"
  github-token: "YOUR_GITHUB_PERSONAL_ACCESS_TOKEN"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pipeline-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
